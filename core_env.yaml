name: core_env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    - torch==2.8.*
    - torchvision==0.23.*
    - timm==1.0.*
    - numpy==2.2.*        # <-- if stability issues, change to "numpy<2"
    - scikit-learn==1.7.*
    - lightgbm==4.6.*
    - pandas==2.3.*
    - scipy==1.16.*
    - pillow==11.3.*
    - matplotlib==3.10.*
    - seaborn==0.13.*
    - tqdm==4.67.*
    - scikit-image==0.25.*
    - opencv-python==4.12.*
    - imagecodecs==2026.3.*
    - openpyxl==3.1.*
    - pyyaml==6.0.*
    - python-dotenv==1.2.*
    - tifffile==2026.3.*
    - fsspec==2026.3.*
    - safetensors==0.7.*
    - tensorflow==2.21.*
    - ipykernel==7.2.*
    - ipython==9.10.*
    - jupyter_client==8.8.*
    - jupyter_core==5.9.*
    - rich==14.3.*
