name: mmseg_env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pytorch=2.1.2
  - torchvision=0.16.2
  - torchaudio=2.1.2
  - pytorch-cuda=11.8
  - numpy=1.26.4
  - scipy
  - matplotlib
  - pandas
  - scikit-image
  - opencv
  - tqdm
  - protobuf
  - python-dotenv
  - fsspec
  - pyyaml
  - terminaltables
  - pip
  - pip:
    - ftfy
    - regex
    - openmim
    - "mmcv==2.1.0 -f https://download.openmmlab.com/mmcv/dist/cu118/torch2.1/index.html"
    - mmengine
    - mmsegmentation